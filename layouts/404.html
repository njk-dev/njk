<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 · {{ .Site.Title }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <meta name="robots" content="noindex">

  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#232320">

  <!-- Favicon (SVG preferred; PNG for browsers without SVG favicon support) -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.png" type="image/png" sizes="64x64">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Mode: dark is default; light via [data-mode="light"], OS-driven with a manual override -->
  <script>
    (function () {
      var m = null;
      try { m = localStorage.getItem('mode'); } catch (e) {}
      if (!m && matchMedia('(prefers-color-scheme: light)').matches) m = 'light';
      if (m === 'light') document.documentElement.setAttribute('data-mode', 'light');
    })();
  </script>

  <!-- Font preloads -->
  <link rel="preload" href="/fonts/IBMPlexMono-Light.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/IBMPlexMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/IBMPlexMono-SemiBold.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="spine"></div>
  <main class="page page-404">
    <header class="running-head">
      <div class="breadcrumb">njk.dev <span class="crumb-sep">/</span> <span class="crumb-leaf crumb-lost">lost</span></div>
      <div class="folio">fol. &empty;</div>
    </header>

    <h1 class="wordmark">404<span class="wm-dot dot-gray">.</span></h1>
    <p class="motto motto-gray">quaerite et invenietis</p>

    <p class="creed lost-note">Nothing lives at this address. The jackalope may have moved it — <span class="lost-aside">he does that.</span></p>

    <nav class="links links-404">
      <a href="/"><span class="arrow">-&gt;</span> home</a>
      <a href="https://github.com/njk-dev"><span class="arrow">-&gt;</span> github.com/njk-dev</a>
    </nav>

    <footer class="footer">
      <div class="footer-inner">
        <div class="mark mark-ghost" title="he was just here"></div>
        <div class="colophon">
          <div class="day-line"><span id="celestial-prep">under the</span> <button class="mode-toggle" id="mode-toggle" role="switch" aria-checked="false" aria-label="moon — switch to light mode">moon</button>, gray today · <span class="word-gray">log</span> — nothing was recorded here</div>
        </div>
      </div>
    </footer>
  </main>

  <script>
    (function () {
      var gray = getComputedStyle(document.documentElement).getPropertyValue('--t-gray').trim();
      console.log('%cquaerite et invenietis — not here, though. try /',
        'color:' + gray + ';font-family:monospace;');

      // the moon/sun phrase: manual mode override, persisted
      var root = document.documentElement;
      var toggle = document.getElementById('mode-toggle');
      var prep = document.getElementById('celestial-prep');
      function paint() {
        var light = root.getAttribute('data-mode') === 'light';
        prep.textContent = light ? 'in the' : 'under the';
        toggle.textContent = light ? 'sun' : 'moon';
        toggle.setAttribute('aria-label', light ? 'sun — switch to dark mode' : 'moon — switch to light mode');
        toggle.setAttribute('aria-checked', light ? 'true' : 'false');
        var tc = document.querySelector('meta[name="theme-color"]');
        if (tc) tc.content = light ? '#f3f1ea' : '#232320';
      }
      toggle.addEventListener('click', function () {
        var next = root.getAttribute('data-mode') === 'light' ? 'dark' : 'light';
        if (next === 'light') root.setAttribute('data-mode', 'light');
        else root.removeAttribute('data-mode');
        paint();
        try {
          // choosing the OS's own mode clears the override — back to following the system
          var os = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          if (next === os) localStorage.removeItem('mode');
          else localStorage.setItem('mode', next);
        } catch (e) {}
      });
      paint();
    })();
  </script>
</body>
</html>
